<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --panel: #111520;
      --border: #1e2a3a;
      --accent: #00e5ff;
      --accent2: #ff4081;
      --green: #00e676;
      --amber: #ffab00;
      --text: #cdd9e5;
      --dim: #4a5a6a;
      --glow: 0 0 18px rgba(0,229,255,0.35);
      --glow2: 0 0 18px rgba(255,64,129,0.4);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px;
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 4;
      display: contents; /* let children participate in body's flex layout */
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 500;
      position: relative;
      z-index: 4;
      margin-bottom: 10px;
    }

    .top-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 4;
    }

    /* Bottom controls cluster */
    .bottom-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 4;
    }

    /* Ring — fixed at center of screen, behind everything */
    .ring-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(75vmin, 520px);
      height: min(75vmin, 520px);
      z-index: 1;
      pointer-events: none;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: #0e161f; stroke-width: 20; }
    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 20;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
      filter: drop-shadow(0 0 8px rgba(0,229,255,0.7));
    }

    /* Time display — breaks free of the ring, fills the window width */
    .display {
      position: fixed;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      z-index: 3;
      pointer-events: none;
    }

    .time-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 100px; /* JS will override this immediately */
      letter-spacing: 0.02em;
      color: #33eeff;
      text-shadow: 0 0 22px rgba(51,238,255,0.6);
      transition: color 0.3s, text-shadow 0.3s;
      line-height: 1;
      white-space: nowrap;
    }

    /* Digits are always a brighter tint than the matching ring color */
    .time-text.running  { color: #33ffaa; text-shadow: 0 0 24px rgba(51,255,170,0.65); }
    .time-text.warning  { color: #ffd84d; text-shadow: 0 0 24px rgba(255,216,77,0.65); }
    .time-text.paused   { color: #ffc933; text-shadow: 0 0 24px rgba(255,201,51,0.65); }
    .time-text.done     { color: #ff6fa3; text-shadow: 0 0 24px rgba(255,111,163,0.65); }
    .time-text.stopped  { color: #ff6fa3; text-shadow: 0 0 24px rgba(255,111,163,0.65); }

    .status-badge {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
      transition: color 0.3s;
    }
    .status-badge.running { color: var(--green); }
    .status-badge.paused  { color: var(--amber); }
    .status-badge.done    { color: var(--accent2); }
    .status-badge.stopped { color: var(--accent2); }

    /* Adjust panel */
    .adjust-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 32px;
      width: 280px;
    }

    .adjust-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .adjust-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .adjust-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .adj-btn {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      font-size: 18px;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    .adj-btn:hover {
      background: rgba(0,229,255,0.1);
      border-color: var(--accent);
    }
    .adj-btn:active { transform: scale(0.92); }

    .adj-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      color: var(--text);
      min-width: 28px;
      text-align: center;
    }

    /* Preset time buttons */
    .presets {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 6px;
      position: relative;
      z-index: 4;
    }

    .preset-btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #1a4a7a;
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4da6ff;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .preset-btn:hover:not(:disabled) {
      background: rgba(77,166,255,0.12);
      border-color: #4da6ff;
      box-shadow: 0 0 10px rgba(77,166,255,0.2);
    }
    .preset-btn:active:not(:disabled) { transform: scale(0.95); }
    .preset-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Control buttons */
    .controls {
      display: flex;
      gap: 12px;
    }

    .ctrl-btn {
      padding: 10px 26px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }

    .ctrl-btn.start {
      border-color: var(--green);
      color: var(--green);
    }
    .ctrl-btn.start:hover { background: rgba(0,230,118,0.12); box-shadow: 0 0 14px rgba(0,230,118,0.2); }

    .ctrl-btn.pause {
      border-color: var(--amber);
      color: var(--amber);
    }
    .ctrl-btn.pause:hover { background: rgba(255,171,0,0.12); box-shadow: 0 0 14px rgba(255,171,0,0.2); }

    .ctrl-btn.stop {
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .ctrl-btn.stop:hover { background: rgba(255,64,129,0.12); box-shadow: 0 0 14px rgba(255,64,129,0.2); }

    .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .ctrl-btn:active:not(:disabled) { transform: scale(0.95); }

    /* Background glow overlay — green → yellow → red */
    #bgGlow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease, background 1.5s ease;
      background: radial-gradient(ellipse at center, rgba(0,180,80,0.30) 0%, rgba(0,100,40,0.15) 60%, transparent 100%);
    }
    #bgGlow.green  { background: radial-gradient(ellipse at center, rgba(0,200,90,0.28)  0%, rgba(0,100,40,0.13)  60%, transparent 100%); }
    #bgGlow.yellow { background: radial-gradient(ellipse at center, rgba(220,180,0,0.35)  0%, rgba(140,100,0,0.18) 60%, transparent 100%); }
    #bgGlow.red    { background: radial-gradient(ellipse at center, rgba(180,0,30,0.45)   0%, rgba(120,0,20,0.25)  60%, transparent 100%); }
    #bgGlow.visible { opacity: 1; }

    /* Done flash */
    @keyframes flashDone {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .time-text.done { animation: flashDone 0.8s ease-in-out infinite; }

    /* Tick pulse on ring when running */
    @keyframes ringPulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .ring-progress.running { animation: ringPulse 1s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="bgGlow"></div>
<div class="container">
  <div class="top-ui">
    <div class="label">Countdown Timer</div>
    <div class="presets" id="presets">
      <button class="preset-btn" data-min="1">1m</button>
      <button class="preset-btn" data-min="5">5m</button>
      <button class="preset-btn" data-min="10">10m</button>
      <button class="preset-btn" data-min="15">15m</button>
      <button class="preset-btn" data-min="20">20m</button>
      <button class="preset-btn" data-min="25">25m</button>
      <button class="preset-btn" data-min="30">30m</button>
      <button class="preset-btn" data-min="40">40m</button>
      <button class="preset-btn" data-min="45">45m</button>
      <button class="preset-btn" data-min="60">60m</button>
    </div>
  </div>

  <div class="ring-wrap">
    <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-bg" cx="190" cy="190" r="174"/>
      <circle class="ring-progress" id="ring" cx="190" cy="190" r="174"
              stroke-dasharray="1093.0" stroke-dashoffset="0"/>
    </svg>
  </div>

  <div class="display">
    <div class="time-text" id="timeDisplay">25:00</div>
    <div class="status-badge" id="statusBadge">Ready</div>
  </div>

  <div class="bottom-ui">
    <div class="adjust-panel">
      <div class="adjust-group">
        <div class="adjust-label">Minutes</div>
        <div class="adjust-row">
          <button class="adj-btn" id="minDown">−</button>
          <div class="adj-val" id="minVal">25</div>
          <button class="adj-btn" id="minUp">+</button>
        </div>
      </div>
      <div class="adjust-group">
        <div class="adjust-label">Seconds</div>
        <div class="adjust-row">
          <button class="adj-btn" id="secDown">−</button>
          <div class="adj-val" id="secVal">00</div>
          <button class="adj-btn" id="secUp">+</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn start" id="btnStart">Start</button>
      <button class="ctrl-btn pause" id="btnPause" disabled>Pause</button>
      <button class="ctrl-btn stop"  id="btnStop"  disabled>Reset</button>
    </div>
  </div>
</div>

<script>
  const CIRC = 2 * Math.PI * 174; // ~1093.0
  const MAX_SECONDS = 60 * 60;

  let totalSeconds = 25 * 60;
  let remaining   = totalSeconds;
  let interval    = null;
  let state       = 'idle'; // idle | running | paused | done

  const timeDisplay = document.getElementById('timeDisplay');
  const statusBadge = document.getElementById('statusBadge');
  const ring        = document.getElementById('ring');
  const minVal      = document.getElementById('minVal');
  const secVal      = document.getElementById('secVal');
  const btnStart    = document.getElementById('btnStart');
  const btnPause    = document.getElementById('btnPause');
  const btnStop     = document.getElementById('btnStop');

  function pad(n) { return String(n).padStart(2, '0'); }

  function fitText() {
    // Binary-search the largest font size where text fits window width
    let lo = 10, hi = 1200;
    timeDisplay.style.fontSize = hi + 'px';
    while (hi - lo > 1) {
      const mid = Math.floor((lo + hi) / 2);
      timeDisplay.style.fontSize = mid + 'px';
      if (timeDisplay.scrollWidth <= window.innerWidth) lo = mid;
      else hi = mid;
    }
    timeDisplay.style.fontSize = lo + 'px';
  }

  function formatTime(s) {
    const neg = s < 0;
    const abs = Math.abs(s);
    const m = Math.floor(abs / 60);
    const sec = abs % 60;
    return `${neg ? '\u2212' : ''}${pad(m)}:${pad(sec)}`;
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    fitText();
    // Adjust panel shows 0:00 once we go negative
    const display = Math.max(0, remaining);
    minVal.textContent = pad(Math.floor(display / 60));
    secVal.textContent = pad(display % 60);
    // Ring stays fully empty once we pass zero
    const fraction = totalSeconds > 0 ? Math.max(0, remaining) / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRC * (1 - fraction);
  }

  const bgGlow = document.getElementById('bgGlow');

  function updateBgGlow() {
    if (state === 'idle') {
      bgGlow.classList.remove('visible', 'green', 'yellow', 'red');
      timeDisplay.classList.remove('warning');
      return;
    }
    if (state === 'done' || state === 'stopped') {
      bgGlow.classList.remove('green', 'yellow');
      bgGlow.classList.add('red', 'visible');
      timeDisplay.classList.remove('warning');
      return;
    }
    // running or paused — pick color based on remaining time
    bgGlow.classList.add('visible');
    if (remaining <= totalSeconds * 0.2) { // 20% or less → yellow
      bgGlow.classList.remove('green', 'red');
      bgGlow.classList.add('yellow');
      timeDisplay.classList.add('warning');
      ring.style.stroke = '#7a5500';
      ring.style.filter = 'drop-shadow(0 0 5px #7a5500cc)';
    } else {
      bgGlow.classList.remove('yellow', 'red');
      bgGlow.classList.add('green');
      timeDisplay.classList.remove('warning');
      ring.style.stroke = '#007340';
      ring.style.filter = 'drop-shadow(0 0 5px #007340cc)';
    }
  }

  function setVisualState(s) {
    timeDisplay.className = 'time-text ' + (s !== 'idle' ? s : '');
    statusBadge.className = 'status-badge ' + (s !== 'idle' ? s : '');
    ring.className        = 'ring-progress ' + (s === 'running' ? 'running' : '');

    const labels = { idle: 'Ready', running: 'Running', paused: 'Paused', done: 'Done', stopped: 'Ended' };
    statusBadge.textContent = labels[s];

    const ringColor = { idle: '#007080', running: '#007340', paused: '#7a5500', done: '#882040', stopped: '#882040' };
    ring.style.stroke = ringColor[s];
    ring.style.filter = `drop-shadow(0 0 5px ${ringColor[s]}cc)`;

    updateBgGlow();
  }

  function setButtons() {
    const canAdjust = state === 'idle';
    btnStart.disabled = state === 'running' || state === 'done' || state === 'stopped';
    btnPause.disabled = state !== 'running' && state !== 'done';
    btnStop.disabled  = state === 'idle';
    document.getElementById('minDown').disabled = !canAdjust;
    document.getElementById('minUp').disabled   = !canAdjust;
    document.getElementById('secDown').disabled = !canAdjust;
    document.getElementById('secUp').disabled   = !canAdjust;
    document.querySelectorAll('.preset-btn').forEach(b => b.disabled = !canAdjust);

    btnStart.textContent = state === 'paused' ? 'Resume' : 'Start';
  }

  function clampSeconds(s) { return Math.max(0, Math.min(MAX_SECONDS, s)); }

  function adjustTime(delta) {
    if (state !== 'idle') return;
    totalSeconds = clampSeconds(totalSeconds + delta);
    remaining    = totalSeconds;
    updateDisplay();
  }

  document.getElementById('presets').addEventListener('click', e => {
    const btn = e.target.closest('.preset-btn');
    if (!btn || state !== 'idle') return;
    totalSeconds = parseInt(btn.dataset.min) * 60;
    remaining    = totalSeconds;
    updateDisplay();
  });

  document.getElementById('minUp').addEventListener('click',   () => adjustTime(60));
  document.getElementById('minDown').addEventListener('click', () => adjustTime(-60));
  document.getElementById('secUp').addEventListener('click',   () => adjustTime(1));
  document.getElementById('secDown').addEventListener('click', () => adjustTime(-1));

  btnStart.addEventListener('click', () => {
    if (state === 'idle' && remaining === 0) return;
    if (state === 'running' || state === 'done') return;

    // If resuming after zero, stay in done visuals but keep ticking
    const resumingNegative = remaining < 0;
    state = resumingNegative ? 'done' : 'running';
    setVisualState(state);
    setButtons();

    interval = setInterval(() => {
      remaining--;
      updateDisplay();
      updateBgGlow();
      if (remaining === 0) {
        state = 'done';
        setVisualState('done');
        setButtons();
      }
      if (remaining <= -totalSeconds) {
        clearInterval(interval);
        interval = null;
        state = 'stopped';
        setVisualState('stopped');
        setButtons();
      }
    }, 1000);
  });

  btnPause.addEventListener('click', () => {
    if (state !== 'running' && state !== 'done') return;
    clearInterval(interval);
    interval = null;
    state = 'paused';
    setVisualState('paused');
    setButtons();
  });

  btnStop.addEventListener('click', () => {
    clearInterval(interval);
    interval = null;
    remaining = totalSeconds;
    state = 'idle';
    setVisualState('idle');
    updateDisplay();
    setButtons();
  });

  // Init
  ring.style.strokeDasharray = CIRC;
  updateDisplay();
  setVisualState('idle');
  setButtons();

  window.addEventListener('resize', fitText);
  // Re-fit after web font finishes loading
  document.fonts.ready.then(fitText);
</script>
</body>
</html>
